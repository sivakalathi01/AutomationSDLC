version: '3.9'

services:
  # Orchestrator API
  orchestrator:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.Orchestrator
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ServiceBus: "Endpoint=sb://localhost:5672/;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY"
      ConnectionStrings__CosmosDb: "AccountEndpoint=https://localhost:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPST/kNoLm5+ezlDBMXbicvXQ=="
    depends_on:
      - cosmos-db
      - service-bus

  # Requirements Agent
  agent-requirements:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.Agent
      args:
        AGENT_PROJECT_PATH: AgentRequirements
    ports:
      - "5001:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      - orchestrator

  # Frontend
  frontend:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.Frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: "http://localhost:5000"
    depends_on:
      - orchestrator

  # Azure Cosmos DB Emulator
  cosmos-db:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    ports:
      - "8081:8081"
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: 4
    volumes:
      - cosmos-db-data:/data/db

  # Azure Service Bus Emulator (using testcontainers image)
  service-bus:
    image: mcr.microsoft.com/windows/servercore:ltsc2022
    ports:
      - "5672:5672"

volumes:
  cosmos-db-data:
